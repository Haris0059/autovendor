spring:
  application:
    name: backend

  datasource:
    url: jdbc:postgresql://localhost:5433/autovendor
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    property-naming-strategy: SNAKE_CASE

server:
  port: 8000

logging:
  level:
    org.hibernate.SQL: INFO
    org.springframework.security: INFO

app:
  jwt:
    secret: "change-me-in-prod-this-must-be-at-least-32-bytes-long-base64-ideally"
    expiration-hours: 168
  crypto:
    key: "bMMZJfJCK6BK2+AQ7YveAblZZtaXm7o1m5Z+gNHbIrc="
  olx:
    base-url: https://api.olx.ba
    device-name: AutoVendor
    token-ttl-days: 30