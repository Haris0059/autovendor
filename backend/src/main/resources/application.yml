spring:
  application:
    name: backend

  datasource:
    url: jdbc:postgresql://localhost:5433/autovendor
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8000

logging:
  level:
    org.hibernate.SQL: INFO
    org.springframework.security: INFO
